# =============================================
# Docker Compose — Pickleball Booking System
# =============================================
# Chạy toàn bộ hệ thống:
#   docker compose up --build -d
#
# Dừng và xóa container:
#   docker compose down
#
# Xem log:
#   docker compose logs -f backend
# =============================================

services:

  # --- MongoDB ---
  mongo:
    image: mongo:7
    container_name: pickleball-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - pickleball-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: pickleball-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - pickleball-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Backend (Node.js / Express) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pickleball-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override URL kết nối để trỏ tới service name trong Docker network
      MONGO_URL: mongodb://mongo:27017/pickleball_booking
      REDIS_URL: redis://redis:6379
      # Cho phép frontend container truy cập API
      FRONTEND_URL: http://localhost
    ports:
      - "5001:5000"   # Ánh xạ ra cổng 5001 ở máy host để tránh trùng với backend đang chạy local (port 5000)
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pickleball-net

  # --- Frontend (React + Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite cần bake URL vào bundle lúc build
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: pickleball-frontend
    restart: unless-stopped
    ports:
      - "80:80"       # truy cập http://localhost
    depends_on:
      - backend
    networks:
      - pickleball-net

# ---- Volumes ----
volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

# ---- Networks ----
networks:
  pickleball-net:
    driver: bridge
